[build]
  command = "npm run build"
  publish = "dist"

# Redirect API requests to Render backend
# Replace YOUR_BACKEND_URL with your actual Render backend URL
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_BACKEND_URL.onrender.com/api/:splat"
  status = 200
  headers = { X-From = "Netlify" }

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
