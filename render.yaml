services:
  # Backend API Service
  - type: web
    name: pharmacy-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharmacy-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://pharmacy-frontend.onrender.com,http://localhost:5173
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health

  # Static Database (PostgreSQL)
databases:
  - name: pharmacy-db
    databaseName: pharmacy_crm
    plan: free
